# Sidecar Deployment: frontend (nginx) + backend (Go) in one Pod.
# Nginx config source of truth: deploy/k8s/nginx-sidecar.conf (keep ConfigMap in sync).
#
# The frontend container serves the SPA and proxies /api and /ws to the backend
# on localhost:8080. Only port 80 is exposed via the Service.
#
# Prerequisites:
#   1. Create the Secret (see secret.example.yaml).
#   2. Build and push images:
#        make build_be build_fe push
#      Frontend must be built with empty VITE_API_BASE (same-origin via nginx):
#        docker buildx build --platform linux/amd64 --target prod \
#          --build-arg VITE_API_BASE= \
#          -t icn.vultrcr.com/homincr1/croquis-king-frontend:latest ./frontend
#   3. If using a private registry, uncomment imagePullSecrets below.
#
# Apply:
#   kubectl apply -f deploy/k8s/secret.yaml
#   kubectl apply -f deploy/k8s/app.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: croquis-king-nginx
  labels:
    app.kubernetes.io/name: croquis-king
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /health {
            proxy_pass http://127.0.0.1:8080;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: croquis-king
  labels:
    app.kubernetes.io/name: croquis-king
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: croquis-king
  template:
    metadata:
      labels:
        app.kubernetes.io/name: croquis-king
    spec:
      # Lets nginx (UID 101) write cache/pid files on emptyDir volumes.
      securityContext:
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
      # imagePullSecrets:
      #   - name: vultr-cr
      volumes:
        - name: nginx-config
          configMap:
            name: croquis-king-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      containers:
        - name: backend
          image: icn.vultrcr.com/homincr1/croquis-king-backend:latest
          imagePullPolicy: Always
          ports:
            - name: backend-http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: PIXABAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: croquis-king-backend
                  key: PIXABAY_API_KEY
            # Same-origin via nginx sidecar; CORS is not used by the browser.
            - name: CORS_ORIGINS
              value: "*"
            - name: DRAW_DURATION
              value: "5m"
          readinessProbe:
            httpGet:
              path: /health
              port: backend-http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: backend-http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop:
                - ALL

        - name: frontend
          image: icn.vultrcr.com/homincr1/croquis-king-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: croquis-king
  labels:
    app.kubernetes.io/name: croquis-king
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: croquis-king
  ports:
    - name: http
      port: 80
      targetPort: http
