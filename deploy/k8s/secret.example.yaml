# Copy to secret.yaml, fill in values, then apply. Do not commit secret.yaml.
#
#   cp deploy/k8s/secret.example.yaml deploy/k8s/secret.yaml
#   kubectl apply -f deploy/k8s/secret.yaml
#   kubectl apply -f deploy/k8s/app.yaml
#
# Or create directly:
#   kubectl create secret generic croquis-king-backend \
#     --from-literal=PIXABAY_API_KEY=your-key
---
apiVersion: v1
kind: Secret
metadata:
  name: croquis-king-backend
  labels:
    app.kubernetes.io/name: croquis-king
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  PIXABAY_API_KEY: replace-me
