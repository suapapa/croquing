services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PIXABAY_API_KEY: ${PIXABAY_API_KEY:?Set PIXABAY_API_KEY in .env or the shell}
      PORT: "8080"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DRAW_DURATION: ${DRAW_DURATION:-5m}
      APP_NAME: ${APP_NAME:-Croquing}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
