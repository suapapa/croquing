<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    .sketch-line {
      stroke: #c2410c;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .sketch-head {
      fill: #c2410c;
    }
    .crown-fill {
      fill: #ea580c;
      opacity: 0.15;
    }
    @media (prefers-color-scheme: dark) {
      .sketch-line {
        stroke: #f97316;
      }
      .sketch-head {
        fill: #f97316;
      }
      .crown-fill {
        fill: #f97316;
        opacity: 0.2;
      }
    }
  </style>
  
  <!-- Soft filled background for the crown area to make it pop -->
  <path d="M12 6.5 L14.5 2.5 L16.5 4.5 L18.5 2.5 L21 6.5 Z" class="crown-fill" />
  
  <!-- The Crown (Tilted slightly on the head) -->
  <path d="M12.5 7 C12 6 14 3 14.5 3 C15 4 16 5 16.5 4.5 C17 5 18 4 18.5 3 C19 3 21 6 20.5 7" class="sketch-line" stroke-width="1.8" />
  <path d="M12 7.2 C14.5 7.7 18.5 7.7 21 7.2" class="sketch-line" stroke-width="1.5" />

  <!-- Head -->
  <circle cx="15.5" cy="11.5" r="2.8" class="sketch-head" />

  <!-- Spine / Torso gesture -->
  <path d="M15.5 14.5 C14.5 18 13.5 21 14.5 24.5" class="sketch-line" />

  <!-- Front Leg gesture (dynamic curve) -->
  <path d="M14.5 24.5 C15.5 26.5 18 27.5 22.5 26.5" class="sketch-line" />

  <!-- Back Leg gesture -->
  <path d="M14 24.5 C11 25.5 8.5 25 6.5 22.5" class="sketch-line" />

  <!-- Back Arm (resting) -->
  <path d="M14.5 16 C12 17 10 19.5 11 22.5" class="sketch-line" />

  <!-- Front Arm (gesture - holding a pencil or drawing/pointing) -->
  <path d="M16 15.5 C18.5 15.5 21 13.5 23 10.5" class="sketch-line" />
</svg>